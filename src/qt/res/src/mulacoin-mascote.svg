<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- moeda de fundo -->
  <circle cx="500" cy="500" r="480" fill="#D4AF37" stroke="#9C7A1E" stroke-width="22"/>
  <circle cx="500" cy="500" r="430" fill="none" stroke="#E8C158" stroke-width="6" opacity="0.6"/>

  <!-- orelhas (atrás da cabeça) -->
  <ellipse cx="365" cy="300" rx="60" ry="155" fill="#8B7355" stroke="#5C4A3A" stroke-width="8" transform="rotate(-18 365 300)"/>
  <ellipse cx="635" cy="300" rx="60" ry="155" fill="#8B7355" stroke="#5C4A3A" stroke-width="8" transform="rotate(18 635 300)"/>
  <ellipse cx="365" cy="300" rx="32" ry="110" fill="#C9A876" transform="rotate(-18 365 300)"/>
  <ellipse cx="635" cy="300" rx="32" ry="110" fill="#C9A876" transform="rotate(18 635 300)"/>

  <!-- cabeça / testa -->
  <ellipse cx="500" cy="430" rx="195" ry="170" fill="#A38B6D" stroke="#5C4A3A" stroke-width="10"/>

  <!-- focinho (alongado, característico de mula) -->
  <path d="M 370 470
           Q 360 650, 420 760
           Q 460 830, 500 835
           Q 540 830, 580 760
           Q 640 650, 630 470
           Q 590 510, 500 515
           Q 410 510, 370 470 Z"
        fill="#C9A876" stroke="#5C4A3A" stroke-width="10"/>

  <!-- topete -->
  <path d="M 460 270 Q 500 220, 540 270 Q 520 260, 500 268 Q 480 260, 460 270 Z" fill="#5C4A3A"/>

  <!-- narinas -->
  <ellipse cx="455" cy="560" rx="18" ry="26" fill="#3A2C20"/>
  <ellipse cx="545" cy="560" rx="18" ry="26" fill="#3A2C20"/>

  <!-- bochechas -->
  <ellipse cx="412" cy="455" rx="28" ry="18" fill="#D9788A" opacity="0.45"/>
  <ellipse cx="588" cy="455" rx="28" ry="18" fill="#D9788A" opacity="0.45"/>

  <!-- olhos (expressao animada/gritando) -->
  <ellipse cx="410" cy="400" rx="26" ry="32" fill="#2A2018"/>
  <ellipse cx="590" cy="400" rx="26" ry="32" fill="#2A2018"/>
  <circle cx="418" cy="390" r="7" fill="#FFFFFF"/>
  <circle cx="598" cy="390" r="7" fill="#FFFFFF"/>
  <path d="M 380 365 Q 410 350, 438 363" stroke="#2A2018" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M 562 363 Q 590 350, 620 365" stroke="#2A2018" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- boca bem aberta relinchando -->
  <path d="M 395 635
           Q 500 800, 605 635
           Q 625 705, 500 760
           Q 375 705, 395 635 Z"
        fill="#6B2C2C" stroke="#3A1414" stroke-width="8"/>
  <!-- lingua -->
  <ellipse cx="500" cy="700" rx="38" ry="28" fill="#B5555F"/>
  <!-- dentes de cima -->
  <path d="M 412 648 L 588 648 L 572 682 L 428 682 Z" fill="#FFF8E7" stroke="#3A1414" stroke-width="4"/>
  <line x1="455" y1="648" x2="450" y2="682" stroke="#C9B896" stroke-width="3"/>
  <line x1="500" y1="650" x2="500" y2="684" stroke="#C9B896" stroke-width="3"/>
  <line x1="545" y1="648" x2="550" y2="682" stroke="#C9B896" stroke-width="3"/>
  <!-- dentes de baixo -->
  <path d="M 425 745 L 575 745 L 588 718 L 412 718 Z" fill="#FFF8E7" stroke="#3A1414" stroke-width="4"/>
  <line x1="460" y1="718" x2="455" y2="745" stroke="#C9B896" stroke-width="3"/>
  <line x1="500" y1="718" x2="500" y2="745" stroke="#C9B896" stroke-width="3"/>
  <line x1="540" y1="718" x2="545" y2="745" stroke="#C9B896" stroke-width="3"/>

  <!-- balao de fala -->
  <g>
    <path d="M 700 230
             q 0 -55 55 -55
             l 165 0
             q 55 0 55 55
             l 0 70
             q 0 55 -55 55
             l -115 0
             l -55 55
             l 15 -55
             q -65 0 -65 -55 Z"
          fill="#FFFFFF" stroke="#2A2018" stroke-width="9"/>
    <text x="835" y="260" font-family="Arial, sans-serif" font-weight="bold" font-size="46"
          fill="#6B2C2C" text-anchor="middle">QUERO</text>
    <text x="835" y="305" font-family="Arial, sans-serif" font-weight="bold" font-size="46"
          fill="#6B2C2C" text-anchor="middle">PICANHA!</text>
  </g>
</svg>
