name: Build Mulacoin Windows

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config \
            g++-mingw-w64-x86-64 mingw-w64 nsis zip curl python3 bison

      - name: Pre-baixar pacotes e corrigir mirrors
        run: |
          mkdir -p depends/sources depends/sources/download-stamps
          sed -i 's/curl -L/curl -L --insecure/g' depends/funcs.mk
          sed -i 's|https://depends.dogecoincore.org||g' depends/funcs.mk

          # OpenSSL 1.0.2u
          wget -q --no-check-certificate "https://web.archive.org/web/20210101120000/https://www.openssl.org/source/old/1.0.2/openssl-1.0.2u.tar.gz" -O depends/sources/openssl-1.0.2u.tar.gz
          HASH=$(sha256sum depends/sources/openssl-1.0.2u.tar.gz | cut -d' ' -f1)
          sed -i "s|openssl_sha256_hash=.*|openssl_sha256_hash=${HASH}|" depends/packages/openssl.mk
          sed -i 's|download_path=https://www.openssl.org/source/old|download_path=https://web.archive.org/web/20210101120000/https://www.openssl.org/source/old|' depends/packages/openssl.mk
          echo "${HASH}  depends/sources/openssl-1.0.2u.tar.gz" > depends/sources/download-stamps/.stamp_fetched-openssl-openssl-1.0.2u.tar.gz.hash
          echo "OpenSSL: ${HASH}"

          # Berkeley DB 5.3.28
          wget -v "https://github.com/berkeleydb/libdb/releases/download/v5.3.28/db-5.3.28.tar.gz" -O depends/sources/db-5.3.28.NC.tar.gz || echo "ERRO wget BDB release"
          ls -la depends/sources/db-5.3.28.NC.tar.gz || echo "ARQUIVO NAO EXISTE"
          wget -v "https://github.com/berkeleydb/libdb/archive/refs/tags/v5.3.28.tar.gz" -O depends/sources/db-5.3.28.NC.tar.gz || echo "ERRO wget BDB archive" 
          HASH=$(sha256sum depends/sources/db-5.3.28.NC.tar.gz | cut -d' ' -f1)
          echo "${HASH}  depends/sources/db-5.3.28.NC.tar.gz" > depends/sources/download-stamps/.stamp_fetched-bdb-db-5.3.28.NC.tar.gz.hash
          echo "BDB: ${HASH}"

          # zlib 1.3 (URL ja corrigida no zlib.mk para github)
          wget -q "https://github.com/madler/zlib/releases/download/v1.3/zlib-1.3.tar.gz" -O depends/sources/zlib-1.3.tar.gz
          HASH=$(sha256sum depends/sources/zlib-1.3.tar.gz | cut -d' ' -f1)
          sed -i "s/ff0ba4c292013dbc27530b3a81e1f9a813cd39de01ca5e0f8bf355702efa593e/${HASH}/" depends/packages/zlib.mk
          echo "${HASH}  depends/sources/zlib-1.3.tar.gz" > depends/sources/download-stamps/.stamp_fetched-zlib-zlib-1.3.tar.gz.hash
          echo "zlib: ${HASH}"

          echo "=== Downloads concluidos ==="
          ls -lh depends/sources/*.tar.* 2>/dev/null
          ls depends/sources/download-stamps/

      - name: Cache dependencias Windows
        uses: actions/cache@v4
        id: cache-depends
        with:
          path: depends/x86_64-w64-mingw32
          key: windows-depends-v16-${{ hashFiles('depends/packages/*.mk') }}

      - name: Compilar dependencias para Windows
        if: steps.cache-depends.outputs.cache-hit != 'true'
        run: |
          cd depends
          make HOST=x86_64-w64-mingw32 -j2

      - name: Configurar build
        run: |
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site \
            ./configure --prefix=/ --disable-tests --disable-bench --disable-zmq

      - name: Compilar Mulacoin
        run: make -j2

      - name: Verificar executaveis
        run: find src/ -name "*.exe" 2>/dev/null

      - name: Empacotar executaveis
        run: |
          mkdir -p release-windows
          cp src/qt/dogecoin-qt.exe    release-windows/mulacoin-qt.exe
          cp src/dogecoind.exe         release-windows/mulacoind.exe
          cp src/dogecoin-cli.exe      release-windows/mulacoin-cli.exe
          cp src/dogecoin-tx.exe       release-windows/mulacoin-tx.exe
          for dll in libwinpthread-1.dll libstdc++-6.dll libgcc_s_seh-1.dll; do
            found=$(find /usr/lib/gcc/x86_64-w64-mingw32 /usr/x86_64-w64-mingw32 -name "$dll" 2>/dev/null | head -1)
            [ -n "$found" ] && cp "$found" release-windows/ && echo "Copiado: $dll"
          done
          ls -lh release-windows/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mulacoin-windows-x64
          path: release-windows/
          retention-days: 30
