name: Build Mulacoin Windows

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config \
            g++-mingw-w64-x86-64 mingw-w64 nsis zip curl python3 bison

      - name: Corrigir mirrors e pre-baixar pacotes problematicos
        run: |
          mkdir -p depends/sources depends/sources/download-stamps

          # Desabilitar SSL e remover mirror quebrado em TODOS os makefiles
          sed -i 's/curl -L/curl -L --insecure/g' depends/funcs.mk
          sed -i 's|https://depends.dogecoincore.org||g' depends/funcs.mk

          # Funcao helper para baixar e criar stamp
          download_and_stamp() {
            local name=$1
            local url=$2
            local filename=$3
            local stamp_name=$4

            echo "=== Baixando $name ==="
            wget -q --no-check-certificate "$url" -O "depends/sources/$filename" || \
              wget -q "$url" -O "depends/sources/$filename" || \
              echo "AVISO: Falha ao baixar $name"

            if [ -f "depends/sources/$filename" ]; then
              HASH=$(sha256sum "depends/sources/$filename" | cut -d' ' -f1)
              echo "$name hash: $HASH"
              # Atualizar hash no .mk correspondente
              find depends/packages -name "*.mk" -exec grep -l "$name" {} \; | while read mk; do
                sed -i "s/sha256_hash=.*/sha256_hash=$HASH/" "$mk" 2>/dev/null || true
              done
              echo "$HASH  depends/sources/$filename" > "depends/sources/download-stamps/$stamp_name"
              echo "$name OK!"
            else
              echo "ERRO: $name nao foi baixado!"
            fi
          }

          # OpenSSL 1.0.2u
          wget -q --no-check-certificate \
            "https://web.archive.org/web/20210101120000/https://www.openssl.org/source/old/1.0.2/openssl-1.0.2u.tar.gz" \
            -O depends/sources/openssl-1.0.2u.tar.gz
          HASH_SSL=$(sha256sum depends/sources/openssl-1.0.2u.tar.gz | cut -d' ' -f1)
          echo "OpenSSL hash: $HASH_SSL"
          sed -i "s/openssl_sha256_hash=.*/openssl_sha256_hash=${HASH_SSL}/" depends/packages/openssl.mk
          sed -i 's|$(package)_download_path=https://www.openssl.org/source/old/$($(package)_version)|$(package)_download_path=https://web.archive.org/web/20210101120000/https://www.openssl.org/source/old/$($(package)_version)|' depends/packages/openssl.mk
          echo "${HASH_SSL}  depends/sources/openssl-1.0.2u.tar.gz" > depends/sources/download-stamps/.stamp_fetched-openssl-openssl-1.0.2u.tar.gz.hash

          # zlib 1.3
          wget -q "https://github.com/madler/zlib/releases/download/v1.3/zlib-1.3.tar.gz" \
            -O depends/sources/zlib-1.3.tar.gz
          HASH_ZL=$(sha256sum depends/sources/zlib-1.3.tar.gz | cut -d' ' -f1)
          echo "zlib hash: $HASH_ZL"
          sed -i "s/zlib_sha256_hash=.*/zlib_sha256_hash=${HASH_ZL}/" depends/packages/zlib.mk || \
            sed -i "s/ff0ba4c292013dbc27530b3a81e1f9a813cd39de01ca5e0f8bf355702efa593e/${HASH_ZL}/" depends/packages/zlib.mk
          echo "${HASH_ZL}  depends/sources/zlib-1.3.tar.gz" > depends/sources/download-stamps/.stamp_fetched-zlib-zlib-1.3.tar.gz.hash

          # Berkeley DB 5.3.28
          wget -q "https://github.com/berkeleydb/libdb/releases/download/v5.3.28/db-5.3.28.tar.gz"             -O depends/sources/db-5.3.28.NC.tar.gz ||           wget -q --no-check-certificate "http://download.oracle.com/berkeley-db/db-5.3.28.NC.tar.gz"             -O depends/sources/db-5.3.28.NC.tar.gz
          HASH_BDB=$(sha256sum depends/sources/db-5.3.28.NC.tar.gz | cut -d' ' -f1)
          echo "BDB hash: $HASH_BDB"
          sed -i "s/76a25560d9e52a198d37a31440fd07632b5f1f8f9f2b6d5438f4bc3e7c9013ef/${HASH_BDB}/" depends/packages/bdb.mk
          echo "${HASH_BDB}  depends/sources/db-5.3.28.NC.tar.gz" > depends/sources/download-stamps/.stamp_fetched-bdb-db-5.3.28.NC.tar.gz.hash
          echo "BDB OK!"
          # Berkeley DB 5.3.28
          wget -q "https://github.com/berkeleydb/libdb/archive/refs/tags/v5.3.28.tar.gz" \
            -O depends/sources/db-5.3.28.NC.tar.gz
          HASH_BDB=$(sha256sum depends/sources/db-5.3.28.NC.tar.gz | cut -d' ' -f1)
          echo "BDB hash: $HASH_BDB"
          sed -i "s/76a25560d9e52a198d37a31440fd07632b5f1f8f9f2b6d5438f4bc3e7c9013ef/${HASH_BDB}/" depends/packages/bdb.mk
          echo "${HASH_BDB}  depends/sources/db-5.3.28.NC.tar.gz" > depends/sources/download-stamps/.stamp_fetched-bdb-db-5.3.28.NC.tar.gz.hash

          # miniupnpc
          wget -q --no-check-certificate \
            "http://miniupnp.free.fr/files/miniupnpc-2.0.20170509.tar.gz" \
            -O depends/sources/miniupnpc-2.0.20170509.tar.gz || \
          wget -q \
            "https://github.com/miniupnp/miniupnp/archive/miniupnpc_2_0_20170509.tar.gz" \
            -O depends/sources/miniupnpc-2.0.20170509.tar.gz
          if [ -f depends/sources/miniupnpc-2.0.20170509.tar.gz ]; then
            HASH_UPP=$(sha256sum depends/sources/miniupnpc-2.0.20170509.tar.gz | cut -d' ' -f1)
            echo "miniupnpc hash: $HASH_UPP"
            sed -i "s/d3c368627f5cdfb66d3ebd64ca39ba54d6ff14a61966dbecb8dd296b7039f16a/${HASH_UPP}/" depends/packages/miniupnpc.mk
            echo "${HASH_UPP}  depends/sources/miniupnpc-2.0.20170509.tar.gz" > depends/sources/download-stamps/.stamp_fetched-miniupnpc-miniupnpc-2.0.20170509.tar.gz.hash
          fi

          echo "=== Arquivos pre-baixados ==="
          ls -lh depends/sources/*.tar.* 2>/dev/null
          echo "=== Stamps criados ==="
          ls depends/sources/download-stamps/

      - name: Cache dependencias Windows
        uses: actions/cache@v4
        id: cache-depends
        with:
          path: depends/x86_64-w64-mingw32
          key: windows-depends-v13-${{ hashFiles('depends/packages/*.mk') }}

      - name: Compilar dependencias para Windows
        if: steps.cache-depends.outputs.cache-hit != 'true'
        run: |
          cd depends
          make HOST=x86_64-w64-mingw32 -j2

      - name: Configurar build
        run: |
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site \
            ./configure --prefix=/ --disable-tests --disable-bench --disable-zmq

      - name: Compilar Mulacoin
        run: make -j2

      - name: Verificar executaveis
        run: |
          echo "=== Buscando .exe ==="
          find src/ -name "*.exe" 2>/dev/null
          ls -la src/qt/dogecoin-qt.exe src/dogecoind.exe src/dogecoin-cli.exe 2>/dev/null || echo "ERRO: executaveis nao encontrados"

      - name: Empacotar executaveis
        run: |
          mkdir -p release-windows
          cp src/qt/dogecoin-qt.exe release-windows/mulacoin-qt.exe
          cp src/dogecoind.exe release-windows/mulacoind.exe
          cp src/dogecoin-cli.exe release-windows/mulacoin-cli.exe
          cp src/dogecoin-tx.exe release-windows/mulacoin-tx.exe
          for dll in libwinpthread-1.dll libstdc++-6.dll libgcc_s_seh-1.dll; do
            found=$(find /usr/lib/gcc/x86_64-w64-mingw32 /usr/x86_64-w64-mingw32 \
                         -name "$dll" 2>/dev/null | head -1)
            [ -n "$found" ] && cp "$found" release-windows/ && echo "Copiado: $dll"
          done
          ls -lh release-windows/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mulacoin-windows-x64
          path: release-windows/
          retention-days: 30
